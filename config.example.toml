# Agent Mail Configuration Example
# Copy to ~/.agent-mail/config.toml and fill in your credentials

default_mailbox = "work"

[mailboxes.work]
name = "工作邮箱"
base_url = "https://mail.your-domain.com"
jwt = "your-jwt-here"

# Add more mailboxes as needed:
# [mailboxes.personal]
# name = "个人邮箱"
# base_url = "https://mail.your-domain.com"
# jwt = "another-jwt-here"
# site_password = "optional-site-password"
