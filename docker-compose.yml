services:
  agent-mail:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--addr", ":8080"]
    environment:
      - HOME=/root
      - ADMIN_PASSWORD=admin123
      - AUTH_HEADER=X-Agent-Mail-Token
      - AUTH_TOKEN=test-token-e2e-2026
    ports:
      - "8080:8080"
    volumes:
      - agent-mail-data:/data

volumes:
  agent-mail-data:
